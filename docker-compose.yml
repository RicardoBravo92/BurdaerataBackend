services:
  backend:
    build: .
    container_name: burdaerata_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/burdaerata
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - AUTHORIZED_PARTIES=${AUTHORIZED_PARTIES}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  db:
    image: postgres:15-alpine
    container_name: burdaerata_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: burdaerata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: