services:
  backend:
    build: .
    container_name: burdaerata_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: always
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:15-alpine
    container_name: burdaerata_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: burdaerata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: burdaerata_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: